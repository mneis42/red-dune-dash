name: Continuous Integration

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-linux-signals:
    runs-on: ubuntu-latest
    outputs:
      check_outcomes: ${{ steps.collect-signals.outputs.check_outcomes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24

      - name: Verify JavaScript syntax
        id: syntax-check
        continue-on-error: true
        run: npm run check

      - name: Run test suite
        id: test-suite
        continue-on-error: true
        run: npm test

      - name: Run simulation tests
        id: simulation-tests
        continue-on-error: true
        run: npm run test:simulation

      - name: Run service worker tests
        id: service-worker-tests
        continue-on-error: true
        run: npm run test:service-worker

      - name: Lint instruction links and headings
        id: instruction-lint
        continue-on-error: true
        run: npm run instruction:lint

      - name: Lint technical docs language policy
        id: docs-language-lint
        continue-on-error: true
        run: npm run docs:language:lint

      - name: Lint backlog templates
        id: backlog-lint
        continue-on-error: true
        run: npm run backlog:lint

      - name: Collect Linux check outcomes
        id: collect-signals
        run: |
          echo 'check_outcomes={"npm run check":"${{ steps.syntax-check.outcome }}","npm test":"${{ steps.test-suite.outcome }}","npm run test:simulation":"${{ steps.simulation-tests.outcome }}","npm run test:service-worker":"${{ steps.service-worker-tests.outcome }}","npm run instruction:lint":"${{ steps.instruction-lint.outcome }}","npm run docs:language:lint":"${{ steps.docs-language-lint.outcome }}","npm run backlog:lint":"${{ steps.backlog-lint.outcome }}"}' >> "$GITHUB_OUTPUT"

      - name: Fail when Linux verification signals are red
        run: |
          if [ "${{ steps.syntax-check.outcome }}" != "success" ] || \
             [ "${{ steps.test-suite.outcome }}" != "success" ] || \
             [ "${{ steps.simulation-tests.outcome }}" != "success" ] || \
             [ "${{ steps.service-worker-tests.outcome }}" != "success" ] || \
             [ "${{ steps.instruction-lint.outcome }}" != "success" ] || \
             [ "${{ steps.docs-language-lint.outcome }}" != "success" ] || \
             [ "${{ steps.backlog-lint.outcome }}" != "success" ]; then
            echo "One or more Linux verification checks failed."
            exit 1
          fi

  cross-platform-verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24

      - name: Verify JavaScript syntax
        run: npm run check

      - name: Run test suite
        run: npm test

      - name: Lint instruction links and headings
        run: npm run instruction:lint

      - name: Lint technical docs language policy
        run: npm run docs:language:lint

      - name: Lint backlog templates
        run: npm run backlog:lint

  advisory-hints:
    if: ${{ always() }}
    continue-on-error: true
    needs:
      - verify-linux-signals
      - cross-platform-verify
      - test
    runs-on: ubuntu-latest
    env:
      AGENT_ADVISORY_CI_JOB_STATUSES: >-
        {"verify-linux-signals":"${{ needs.verify-linux-signals.result }}","cross-platform-verify":"${{ needs.cross-platform-verify.result }}","required-check":"${{ needs.test.result }}"}
      AGENT_ADVISORY_CI_CHECK_OUTCOMES: ${{ needs.verify-linux-signals.outputs.check_outcomes }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24

      - name: Advisory change hints (non-blocking)
        run: |
          EVENT_NAME="${{ github.event_name }}"
          BASE_SHA=""
          HEAD_SHA=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [ "$EVENT_NAME" = "push" ]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] && git cat-file -e "$BASE_SHA^{commit}" >/dev/null 2>&1 && git cat-file -e "$HEAD_SHA^{commit}" >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" | paste -sd, -)
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BASE_SHA^{commit}" >/dev/null 2>&1 && git cat-file -e "$HEAD_SHA^{commit}" >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | paste -sd, -)
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | paste -sd, -)
          else
            CHANGED_FILES=""
          fi

          if [ -z "$CHANGED_FILES" ]; then
            npm run agent:advisory
          else
            npm run agent:advisory -- --files "$CHANGED_FILES"
          fi

  test:
    if: ${{ always() }}
    needs:
      - verify-linux-signals
      - cross-platform-verify
    runs-on: ubuntu-latest

    steps:
      - name: Compatibility success gate
        # Keep job id "test" stable for required-check compatibility.
        run: |
          if [ "${{ needs.verify-linux-signals.result }}" = "success" ] && [ "${{ needs.cross-platform-verify.result }}" = "success" ]; then
            echo "Cross-platform verification completed successfully."
          else
            echo "Linux verification result: ${{ needs.verify-linux-signals.result }}"
            echo "Cross-platform verification result: ${{ needs.cross-platform-verify.result }}"
            exit 1
          fi
