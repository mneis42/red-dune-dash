name: Continuous Integration

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24

      - name: Verify JavaScript syntax
        run: npm run check

      - name: Run test suite
        run: npm test

      - name: Lint instruction links and headings
        run: npm run instruction:lint

      - name: Lint backlog templates
        run: npm run backlog:lint

  advisory-hints:
    continue-on-error: true
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24

      - name: Advisory change hints (non-blocking)
        continue-on-error: true
        run: |
          EVENT_NAME="${{ github.event_name }}"
          BASE_SHA=""
          HEAD_SHA=""

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [ "$EVENT_NAME" = "push" ]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] && git cat-file -e "$BASE_SHA^{commit}" >/dev/null 2>&1 && git cat-file -e "$HEAD_SHA^{commit}" >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" | paste -sd, -)
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BASE_SHA^{commit}" >/dev/null 2>&1 && git cat-file -e "$HEAD_SHA^{commit}" >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | paste -sd, -)
          elif git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | paste -sd, -)
          else
            CHANGED_FILES=""
          fi

          if [ -z "$CHANGED_FILES" ]; then
            npm run agent:advisory
          else
            npm run agent:advisory -- --files "$CHANGED_FILES"
          fi

  test:
    if: ${{ always() }}
    needs:
      - core-verify
    runs-on: ubuntu-latest

    steps:
      - name: Compatibility success gate
        # Keep job id "test" stable for required-check compatibility.
        run: |
          if [ "${{ needs.core-verify.result }}" = "success" ]; then
            echo "Core verification matrix completed successfully."
          else
            echo "Core verification matrix result: ${{ needs.core-verify.result }}"
            exit 1
          fi
