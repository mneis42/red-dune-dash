name: Continuous Integration

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Verify JavaScript syntax
        shell: bash
        run: |
          for file in app-assets.js service-worker.js systems/*.js game-endless.js; do
            node --check "$file"
          done

      - name: Run gameplay tests
        run: node tests/simulation-core.test.js

      - name: Run service worker smoke tests
        run: node tests/service-worker.test.js
