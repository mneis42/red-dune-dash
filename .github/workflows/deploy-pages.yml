name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24

      - name: Verify JavaScript syntax
        run: npm run check

      - name: Run test suite
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Prepare static site
        shell: bash
        run: |
          mkdir -p dist
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "dist" \
            ./ dist/

      - name: Stamp app and cache versions
        shell: bash
        run: |
          VERSION="${GITHUB_SHA::12}"
          printf '{\n  "version": "%s"\n}\n' "${VERSION}" > dist/version.json
          sed -i "s|^const APP_VERSION = \".*\";|const APP_VERSION = \"${VERSION}\";|" dist/game-endless.js
          sed -i "s|^    cacheName: \".*\",|    cacheName: \"red-dune-dash-${VERSION}\",|" dist/app-assets.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
