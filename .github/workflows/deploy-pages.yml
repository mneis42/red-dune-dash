name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Verify JavaScript syntax
        shell: bash
        run: |
          for file in app-assets.js service-worker.js systems/*.js game-endless.js; do
            node --check "$file"
          done

      - name: Run gameplay tests
        run: node tests/simulation-core.test.js

      - name: Run service worker smoke tests
        run: node tests/service-worker.test.js

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare static site
        shell: bash
        run: |
          mkdir -p dist
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "dist" \
            ./ dist/

      - name: Stamp app and cache versions
        shell: bash
        run: |
          VERSION="${GITHUB_SHA::12}"
          printf '{\n  "version": "%s"\n}\n' "${VERSION}" > dist/version.json
          sed -i "s|^const APP_VERSION = \".*\";|const APP_VERSION = \"${VERSION}\";|" dist/game-endless.js
          sed -i "s|^    cacheName: \".*\",|    cacheName: \"red-dune-dash-${VERSION}\",|" dist/app-assets.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
